version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "prettier-plugin-tailwindcss"
          - "tw-animate-css"
      serwist:
        patterns:
          - "serwist"
          - "@serwist/*"
      ui:
        patterns:
          - "@base-ui/react"
          - "lucide-react"
          - "vaul"
          - "sonner"
          - "class-variance-authority"
          - "clsx"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
